<!DOCTYPE html>
<html lang="es">
<head>
<style>
  :root { color-scheme: dark; --bg:#0f172a; }
  html,body { background-color: #0f172a !important; }
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 Valores – La Vida</title>
<link rel="stylesheet" href="../components/shared.css">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<!-- Cloudflare Web Analytics -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "2f62d02dae6f47348de2ad83cf623a43"}'></script>

<style>
:root {
  --green:#16a34a; --green-l:#22c55e; --green-bg:#dcfce7;
  --teal:#0d9488; --teal-l:#14b8a6; --teal-bg:#ccfbf1;
  --amber:#d97706; --amber-l:#f59e0b; --amber-bg:#fef3c7;
  --rose:#e11d48; --rose-l:#f43f5e; --rose-bg:#ffe4e6;
  --violet:#7c3aed; --violet-l:#8b5cf6; --violet-bg:#ede9fe;
  --sky-c:#0284c7; --sky-bg:#e0f2fe;
  --navy:#1a2744;
  --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
  --gray-400:#94a3b8;--gray-600:#475569;--gray-800:#1e293b;
  --shadow:0 4px 16px rgba(0,0,0,.12);
  --shadow-lg:0 8px 32px rgba(0,0,0,.16);
  --radius:16px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#0f172a;min-height:100vh;color:var(--gray-800);overflow-x:hidden}

/* Stars */
.stars-bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0f172a 0%,#064e3b 50%,#0f172a 100%);overflow:hidden}
.stars-bg::before{content:'★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦';
  position:absolute;inset:0;font-size:12px;color:rgba(255,255,255,.06);
  line-height:2.5;word-break:break-all;animation:twinkle 4s ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.5}to{opacity:1}}

.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:linear-gradient(135deg,#064e3b 0%,#16a34a 100%);padding:16px 24px;
  display:flex;align-items:center;gap:16px;border-bottom:3px solid rgba(255,255,255,.15);
  box-shadow:0 4px 20px rgba(0,0,0,.3)}
.header-logo{font-family:'Fredoka One',cursive;font-size:20px;color:white;text-shadow:0 2px 4px rgba(0,0,0,.3)}
.header-logo span{color:#fbbf24}
.header-sub{font-size:12px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.5px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}

/* Progress strip */
.progress-strip{background:rgba(0,0,0,.3);padding:10px 24px;display:flex;align-items:center;gap:16px}
.progress-label{font-size:11px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:1px;white-space:nowrap}
.progress-track{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#16a34a,#86efac);border-radius:4px;transition:width .5s ease}
.progress-pct{font-size:12px;color:#86efac;font-weight:800}

.main{flex:1;display:flex;gap:0}

/* Sidebar */
.sidebar{width:240px;flex-shrink:0;background:rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.08);
  padding:20px 12px;display:flex;flex-direction:column;gap:6px}
.sidebar-section{font-size:10px;color:rgba(255,255,255,.3);font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:8px 8px 4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;
  transition:all .2s;border:none;background:transparent;width:100%;text-align:left;
  color:rgba(255,255,255,.6);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700}
.nav-btn:hover{background:rgba(255,255,255,.08);color:white}
.nav-btn.active{background:rgba(22,163,74,.3);color:white;border:1px solid rgba(22,163,74,.5)}
.nav-btn.completed{color:#86efac}
.nav-btn .nav-icon{font-size:18px;width:24px;text-align:center}
.nav-btn .nav-stars{margin-left:auto;font-size:12px}

.content{flex:1;padding:28px;overflow-y:auto;max-height:calc(100vh - 100px)}

.screen{display:none}
.screen.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Home hero */
.home-hero{background:linear-gradient(135deg,#064e3b 0%,#166534 60%,#1e3a5f 100%);
  border-radius:24px;padding:40px;margin-bottom:24px;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.home-hero::before{content:'🛌🥗🏃';position:absolute;right:-10px;top:50%;transform:translateY(-50%);
  font-size:48px;opacity:.15;writing-mode:vertical-rl;letter-spacing:12px}
.home-hero h1{font-family:'Fredoka One',cursive;font-size:38px;color:white;margin-bottom:8px}
.home-hero h1 span{color:#86efac}
.home-hero p{color:rgba(255,255,255,.8);font-size:15px;max-width:500px;line-height:1.6}

/* Class cards */
.classes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.class-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:20px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.class-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.3);border-color:rgba(255,255,255,.2)}
.class-card.unlocked{background:rgba(255,255,255,.08)}
.class-card.completed{border-color:rgba(22,163,74,.4);background:rgba(22,163,74,.07)}
.class-number{font-size:11px;color:rgba(255,255,255,.4);font-weight:800;letter-spacing:1px;margin-bottom:8px}
.class-icon{font-size:36px;margin-bottom:10px}
.class-title{font-family:'Fredoka One',cursive;font-size:18px;color:white;margin-bottom:4px}
.class-desc{font-size:12px;color:rgba(255,255,255,.5);line-height:1.5}
.class-status{position:absolute;top:14px;right:14px;font-size:18px}
.class-stars{margin-top:12px;font-size:16px;color:#fbbf24}

/* Lesson header */
.lesson-header{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:16px}
.lesson-icon{font-size:42px}
.lesson-info h2{font-family:'Fredoka One',cursive;font-size:26px;color:white}
.lesson-info p{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px}

/* Phase tabs */
.phase-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.phase-tab{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:30px;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:1px solid transparent;
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);font-family:'Nunito',sans-serif}
.phase-tab.active{background:var(--green);color:white;border-color:var(--green-l)}
.phase-tab.done{background:rgba(22,163,74,.15);color:#86efac;border-color:rgba(22,163,74,.3)}

/* Cards */
.card{background:white;border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.card-title{font-family:'Fredoka One',cursive;font-size:20px;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* Theory highlight */
.theory-highlight{background:var(--amber-bg);border-left:4px solid var(--amber-l);
  border-radius:0 12px 12px 0;padding:14px 18px;margin:12px 0;font-size:14px;color:var(--gray-800);line-height:1.8}
.theory-highlight.green{background:var(--green-bg);border-color:var(--green)}
.theory-highlight.rose{background:var(--rose-bg);border-color:var(--rose)}
.theory-highlight.teal{background:var(--teal-bg);border-color:var(--teal)}
.theory-highlight.violet{background:var(--violet-bg);border-color:var(--violet)}
.theory-highlight.sky{background:var(--sky-bg);border-color:var(--sky-c)}

/* Exercise box */
.exercise-box{background:var(--gray-50);border:2px solid var(--gray-200);border-radius:14px;padding:20px;margin-bottom:16px}
.exercise-box .q-num{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--green);text-transform:uppercase;margin-bottom:8px}
.exercise-box .q-text{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px}

/* Options */
.options{display:flex;flex-wrap:wrap;gap:8px}
.option-btn{padding:10px 20px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
  transition:all .2s;border:2px solid var(--gray-200);background:white;color:var(--navy);font-family:'Nunito',sans-serif}
.option-btn:hover:not(:disabled){border-color:var(--green);background:var(--green-bg)}
.option-btn.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.option-btn.wrong{background:var(--rose-bg);border-color:var(--rose);color:var(--rose)}
.option-btn:disabled{cursor:not-allowed;opacity:.8}

/* Text input */
.text-input{padding:12px 16px;border:2px solid var(--gray-200);border-radius:10px;
  font-size:16px;font-family:'Nunito',sans-serif;font-weight:700;outline:none;transition:all .2s;
  background:#fff !important;color:#1a2744 !important}
.text-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.15)}
.text-input.correct{border-color:var(--green);background:var(--green-bg) !important}
.text-input.wrong{border-color:var(--rose);background:var(--rose-bg) !important}

/* Feedback */
.feedback{padding:12px 16px;border-radius:10px;font-weight:700;font-size:14px;margin-top:10px;display:none}
.feedback.show{display:block;animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
.feedback.correct{background:var(--green-bg);color:var(--green)}
.feedback.wrong{background:var(--rose-bg);color:var(--rose)}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}

/* Buttons */
.btn{padding:12px 24px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;
  transition:all .2s;border:none;font-family:'Nunito',sans-serif;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--green);color:white}
.btn-primary:hover{background:var(--green-l);transform:translateY(-1px);box-shadow:0 4px 12px rgba(22,163,74,.4)}
.btn-success{background:var(--teal);color:white}
.btn-success:hover{background:var(--teal-l);transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.97)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

/* Score card */
.score-card{text-align:center;padding:32px;background:white;border-radius:20px;box-shadow:var(--shadow-lg)}
.score-big{font-family:'Fredoka One',cursive;font-size:64px;color:var(--green)}
.score-label{font-size:16px;color:var(--gray-600);margin-bottom:20px}
.stars-display{font-size:36px;letter-spacing:4px}

/* Mini test dots */
.test-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.test-dots{display:flex;gap:6px}
.test-dot{width:12px;height:12px;border-radius:50%;background:var(--gray-200);transition:all .3s}
.test-dot.current{background:var(--green);transform:scale(1.3)}
.test-dot.done-correct{background:var(--green)}
.test-dot.done-wrong{background:var(--rose)}

/* True/False */
.tf-row{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.tf-btn{padding:12px 28px;border-radius:12px;font-family:'Fredoka One',cursive;font-size:17px;
  border:2px solid var(--gray-200);background:white;cursor:pointer;transition:all .2s;color:var(--navy)}
.tf-btn:hover:not(:disabled){transform:scale(1.05)}
.tf-btn.verd:hover:not(:disabled){border-color:var(--green);background:var(--green-bg)}
.tf-btn.fals:hover:not(:disabled){border-color:var(--rose);background:var(--rose-bg)}
.tf-btn.correct{background:var(--green-bg) !important;border-color:var(--green) !important;color:var(--green) !important}
.tf-btn.wrong{background:var(--rose-bg) !important;border-color:var(--rose) !important;color:var(--rose) !important}
.tf-btn:disabled{cursor:not-allowed}

/* Drag sort */
.sort-list{list-style:none;margin:0;padding:0}
.sort-item{background:white;border:2px solid var(--gray-200);border-radius:10px;padding:12px 16px;
  margin-bottom:8px;cursor:grab;display:flex;align-items:center;gap:10px;
  font-weight:700;font-size:14px;color:var(--navy);user-select:none;transition:all .15s}
.sort-item:active{cursor:grabbing;box-shadow:var(--shadow)}
.sort-item.drag-over{border-color:var(--green);background:var(--green-bg)}
.sort-handle{color:var(--gray-400);font-size:18px}

/* Progress screen */
.progress-topic-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 18px;margin-bottom:8px}
.progress-topic-row .pt-icon{font-size:22px}
.progress-topic-row .pt-name{font-weight:700;color:rgba(255,255,255,.8);flex:1;font-size:14px}
.progress-topic-row .pt-score{font-family:'Fredoka One',cursive;font-size:22px;color:#86efac}
.progress-topic-row .pt-bar{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.progress-topic-row .pt-fill{height:100%;background:linear-gradient(90deg,#16a34a,#86efac);border-radius:99px;transition:width .8s}

.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}

@media(max-width:700px){.sidebar{display:none}.content{padding:16px}}
</style>
</head>
<body>
<div class="stars-bg"></div>
<div class="app">
<div id="app-header-root"></div>

<div class="progress-strip">
  <div class="progress-label">PROGRESO DEL TEMA</div>
  <div class="progress-track"><div class="progress-fill" id="overall-progress" style="width:0%"></div></div>
  <div class="progress-pct" id="overall-pct">0%</div>
</div>

<div class="main">
<div class="sidebar">
  <div class="sidebar-section">Navegación</div>
  <button class="nav-btn active" onclick="showScreen('tema')" id="nav-tema">
    <span class="nav-icon">🌱</span> Valores
  </button>
  <div class="sidebar-section" style="margin-top:8px">Mi Progreso</div>
  <button class="nav-btn" onclick="showScreen('progreso')" id="nav-progreso">
    <span class="nav-icon">📊</span> Resultados
  </button>
</div>

<div class="content">
<div class="screen active" id="screen-tema">
  <div class="lesson-header">
    <div class="lesson-icon">🌱</div>
    <div class="lesson-info">
      <h2>Valores</h2>
      <p>Honestidad, respeto, gratitud y empatía</p>
    </div>
    <button class="btn-back" onclick="history.back()" style="margin-left:auto">← Volver</button>
  </div>
  <div class="phase-tabs" id="tabs-tema"></div>
  <div id="tema-content"></div>
</div>
<div class="screen" id="screen-progreso">
  <div id="progreso-content"></div>
</div>
</div>
</div>
</div>
<div id="app-footer-root"></div>

<script>
const progress = { tema:{done:false,score:0} };

function updateHome() {
  const pct = progress.tema.done ? progress.tema.score : 0;
  document.getElementById('overall-progress').style.width = pct+'%';
  document.getElementById('overall-pct').textContent = pct+'%';
}

let _init = false;
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  const nb=document.getElementById('nav-'+id); if(nb) nb.classList.add('active');
  if(id==='tema' && !_init) { _init=true; PHASES.tema.show(1); }
  if(id==='progreso') buildProgreso();
}
window.showScreen=showScreen;

function setTab(id, n) {
  const labels = PHASES[id].tabs;
  const wrap = document.getElementById('tabs-'+id); if(!wrap) return;
  wrap.innerHTML = labels.map((l,i)=>`
    <div class="phase-tab ${i+1===n?'active':''}" onclick="PHASES['${id}'].show(${i+1})">${l}</div>`).join('');
}

// ═══════════════════════════════════════════
// MINI TEST ENGINE (idéntico a mat6)
// ═══════════════════════════════════════════
function buildMiniTest(qs, containerId, onDone) {
  let curr=0, correct=0, results=[];
  const dots = qs.map(()=>'').join('');

  function render() {
    const c = document.getElementById(containerId); if(!c) return;
    if(curr>=qs.length) {
      const pct=Math.round(correct/qs.length*100);
      const stars=pct>=80?'⭐⭐⭐':pct>=60?'⭐⭐':'⭐';
      const msg=pct===100?'¡Perfecto! Eres un crack 🔥':pct>=80?'¡Muy bien! Casi perfecto 💪':pct>=60?'¡Bien hecho! Sigue así 👍':'Repasa el tema e inténtalo otra vez 📖';
      c.innerHTML=`<div class="score-card">
        <div class="stars-display">${stars}</div>
        <div class="score-big">${pct}%</div>
        <div class="score-label">${msg}<br><small>${correct} de ${qs.length} correctas</small></div>
      </div>`;
      if(onDone) onDone(pct);
      return;
    }
    const q=qs[curr];
    const dotHTML=qs.map((_,i)=>`<div class="test-dot ${i<curr?(results[i]?'done-correct':'done-wrong'):i===curr?'current':''}"></div>`).join('');
    const qid='mt'+curr;

    if(q.type==='mc'){
      c.innerHTML=`<div class="test-progress"><span style="font-size:13px;color:rgba(255,255,255,.6);font-weight:700">Pregunta ${curr+1}/${qs.length}</span><div class="test-dots">${dotHTML}</div></div>
        <div class="exercise-box">
          <div class="q-num">Pregunta ${curr+1}</div>
          <div class="q-text">${q.question}</div>
          <div class="options" id="${qid}_opts">
            ${q.options.map(o=>`<button class="option-btn" data-correct="${q.correct}" data-chosen="${o}" onclick="mtAns(this,'${qid}','${containerId}')">${o}</button>`).join('')}
          </div>
          <div class="feedback" id="${qid}_fb"></div>
        </div>`;
    } else if(q.type==='tf'){
      c.innerHTML=`<div class="test-progress"><span style="font-size:13px;color:rgba(255,255,255,.6);font-weight:700">Pregunta ${curr+1}/${qs.length}</span><div class="test-dots">${dotHTML}</div></div>
        <div class="exercise-box">
          <div class="q-num">Verdadero o Falso – Pregunta ${curr+1}</div>
          <div class="q-text">${q.question}</div>
          <div class="tf-row">
            <button class="tf-btn verd" data-correct="${q.correct}" data-chosen="verdadero" onclick="mtTF(this,'${qid}','${containerId}')">✅ Verdadero</button>
            <button class="tf-btn fals" data-correct="${q.correct}" data-chosen="falso" onclick="mtTF(this,'${qid}','${containerId}')">❌ Falso</button>
          </div>
          <div class="feedback" id="${qid}_fb"></div>
        </div>`;
    } else if(q.type==='write'){
      c.innerHTML=`<div class="test-progress"><span style="font-size:13px;color:rgba(255,255,255,.6);font-weight:700">Pregunta ${curr+1}/${qs.length}</span><div class="test-dots">${dotHTML}</div></div>
        <div class="exercise-box">
          <div class="q-num">Escribe tu respuesta – Pregunta ${curr+1}</div>
          <div class="q-text">${q.question}</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input class="text-input" id="${qid}_inp" placeholder="Escribe aquí..." style="flex:1;min-width:200px">
            <button class="btn btn-primary" onclick="mtWrite('${qid}','${containerId}','${q.correct}')">Comprobar ✓</button>
          </div>
          <div class="feedback" id="${qid}_fb"></div>
        </div>`;
    }
  }

  function next(ok){ results.push(ok); if(ok) correct++; curr++; setTimeout(render, ok?600:1500); }

  window.mtAns = function(btn,qid,cid){
    if(containerId!==cid) return;
    document.querySelectorAll('#'+qid+'_opts .option-btn').forEach(b=>b.disabled=true);
    const ok=btn.dataset.chosen===btn.dataset.correct;
    btn.classList.add(ok?'correct':'wrong');
    if(!ok) document.querySelectorAll('#'+qid+'_opts .option-btn').forEach(b=>{if(b.dataset.chosen===btn.dataset.correct)b.classList.add('correct');});
    const fb=document.getElementById(qid+'_fb');
    fb.className='feedback '+(ok?'correct':'wrong')+' show';
    fb.textContent=ok?'✅ ¡Correcto!':'❌ La respuesta correcta era: '+btn.dataset.correct;
    next(ok);
  };
  window.mtTF = function(btn,qid,cid){
    if(containerId!==cid) return;
    document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
    const ok=btn.dataset.chosen===btn.dataset.correct;
    btn.classList.add(ok?'correct':'wrong');
    const fb=document.getElementById(qid+'_fb');
    fb.className='feedback '+(ok?'correct':'wrong')+' show';
    fb.textContent=ok?'✅ ¡Correcto!':'❌ Era: '+btn.dataset.correct;
    next(ok);
  };
  window.mtWrite = function(qid,cid,correct){
    if(containerId!==cid) return;
    const inp=document.getElementById(qid+'_inp');
    const ok=inp.value.trim().toLowerCase()===correct.toLowerCase();
    inp.classList.add(ok?'correct':'wrong'); inp.disabled=true;
    document.querySelector(`button[onclick*="${qid}"]`).disabled=true;
    const fb=document.getElementById(qid+'_fb');
    fb.className='feedback '+(ok?'correct':'wrong')+' show';
    fb.textContent=ok?'✅ ¡Correcto!':'❌ La respuesta era: '+correct;
    next(ok);
  };
  render();
}
window.buildMiniTest = buildMiniTest;

// CLASE 6: VALORES 🌱
// ═══════════════════════════════════════════════════════════
function showValsPhase(n){
  setTab('tema',n,4);
  const c=document.getElementById('tema-content');
  if(n===1){
    c.innerHTML=`
    <div class="card">
      <div class="card-title">🌱 Los valores: quién eres de verdad</div>
      <p style="color:var(--gray-600);margin-bottom:14px">Los valores no son palabras bonitas. Son las decisiones que tomas cada día, especialmente cuando nadie te mira.</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        ${[['🤝','Honestidad','Decir la verdad, aunque sea difícil o te perjudique.'],
           ['🌟','Respeto','Tratar a todos como quieres que te traten a ti.'],
           ['💪','Esfuerzo','Dar lo mejor de ti, aunque nadie te mire.'],
           ['🙏','Gratitud','Agradecer lo que tienes y lo que hacen por ti.'],
           ['❤️','Empatía','Entender cómo se siente el otro y actuar en consecuencia.'],
           ['🏆','Responsabilidad','Cumplir lo que te comprometiste, sin excusas.']].map(([ico,nom,def])=>`
        <div style="background:var(--teal-bg);border:2px solid rgba(13,148,136,.2);border-radius:12px;padding:14px">
          <div style="font-family:'Fredoka One',cursive;font-size:16px;color:var(--teal);margin-bottom:4px">${ico} ${nom}</div>
          <div style="font-size:13px;color:var(--gray-600);line-height:1.5">${def}</div>
        </div>`).join('')}
      </div>
      <div class="theory-highlight teal"><strong>💡 Los valores en acción:</strong><br>
        Un niño honesto reconoce sus errores en lugar de culpar a otros.<br>
        Un niño empático ayuda al compañero que está solo en el recreo.<br>
        Un niño responsable hace sus deberes sin que se lo recuerden.<br>
        <em>No es perfecto — nadie lo es. Lo importante es intentarlo cada día.</em></div>
      <div class="theory-highlight green"><strong>🔬 ¿Por qué importan los valores?</strong><br>
        Las personas con buenos valores tienen mejores amistades, más confianza en sí mismas,
        mayor bienestar emocional y más éxito a largo plazo. No porque sean perfectas,
        sino porque se ganan la confianza y el respeto de los demás.</div>
    </div>
    <div class="btn-row"><button class="btn btn-primary" onclick="showValsPhase(2)">Siguiente →</button></div>`;
  } else if(n===2){ buildValsDilemas(); }
  else if(n===3){ buildValsTF(); }
  else if(n===4){ buildValsTest(); }
}
window.showValsPhase=showValsPhase;

function buildValsDilemas(){
  const dilemas=[
    {s:'Encuentras una cartera con dinero en el suelo del colegio y nadie te ha visto.',
     ops:['Me lo quedo — ¡qué suerte!','Lo entrego al profesor por si alguien lo perdió','Lo dejo donde estaba y me voy'],
     correct:'Lo entrego al profesor por si alguien lo perdió',
     exp:'Honestidad en acción. Ese dinero puede ser muy importante para quien lo perdió.',val:'🤝 Honestidad'},
    {s:'Tu equipo pierde por culpa de un error tuyo. Un compañero te echa la culpa.',
     ops:['Le digo que él también falló','Reconozco mi error y pido disculpas al equipo','Me enfado y me voy a casa'],
     correct:'Reconozco mi error y pido disculpas al equipo',
     exp:'Reconocer los errores cuesta, pero es la base de la honestidad y el respeto mutuo.',val:'🤝 Honestidad + 🏆 Responsabilidad'},
    {s:'Ves que un compañero está solo en el recreo y parece muy triste.',
     ops:['No es mi problema, sigo jugando','Me acerco a preguntarle si está bien','Me río con mis amigos de que está solo'],
     correct:'Me acerco a preguntarle si está bien',
     exp:'Eso es empatía. Un gesto pequeño puede cambiar completamente el día de alguien.',val:'❤️ Empatía'},
    {s:'Tu madre te pide que ordenes tu habitación, pero prefieres seguir jugando.',
     ops:['Ordeno ahora y luego juego','Digo que sí pero no lo hago','Me enfado y discuto'],
     correct:'Ordeno ahora y luego juego',
     exp:'Cumplir con tus responsabilidades desarrolla la disciplina y la confianza propia.',val:'🏆 Responsabilidad'},
    {s:'Un amigo te pide que guardes un secreto que puede perjudicar a alguien.',
     ops:['Guardo el secreto pase lo que pase','Hablo con un adulto de confianza si alguien puede salir herido','Se lo cuento a todo el mundo'],
     correct:'Hablo con un adulto de confianza si alguien puede salir herido',
     exp:'La lealtad tiene límites. Si guardar un secreto puede hacer daño, es mejor buscar ayuda.',val:'🤝 Honestidad + ❤️ Empatía'},
    {s:'Alguien te hace un favor importante y espera que lo agradezcas.',
     ops:['No digo nada, ya sabe que estoy contento','Le doy las gracias de corazón y de forma concreta','Le digo que no era para tanto'],
     correct:'Le doy las gracias de corazón y de forma concreta',
     exp:'La gratitud sincera fortalece las relaciones y hace que la gente quiera ayudarte más.',val:'🙏 Gratitud'},
  ];
  document.getElementById('tema-content').innerHTML=`
    <div class="card"><div class="card-title">🤔 ¿Qué harías tú?</div>
    <p style="color:var(--gray-600);margin-bottom:16px">Lee cada dilema y elige la respuesta que crees que es la correcta. No hay trampa: piensa de verdad.</p></div>
    ${dilemas.map((d,i)=>`
    <div class="exercise-box" id="vd-box-${i}">
      <div class="q-num">Dilema ${i+1} · Valor: ${d.val}</div>
      <div class="q-text">${d.s}</div>
      <div class="options" id="vd-opts-${i}">
        ${d.ops.map(o=>`<button class="option-btn" data-correct="${d.correct}" data-chosen="${o}"
          onclick="checkVD(this,${i},'${d.exp.replace(/'/g,'&#39;')}')">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="vd-fb-${i}"></div>
    </div>`).join('')}
    <div class="btn-row"><button class="btn btn-success" onclick="showValsPhase(3)">Siguiente →</button></div>`;
}
window.checkVD=function(btn,i,exp){
  document.querySelectorAll('#vd-opts-'+i+' .option-btn').forEach(b=>b.disabled=true);
  const ok=btn.dataset.chosen===btn.dataset.correct;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok)document.querySelectorAll('#vd-opts-'+i+' .option-btn').forEach(b=>{if(b.dataset.chosen===btn.dataset.correct)b.classList.add('correct');});
  const fb=document.getElementById('vd-fb-'+i);
  fb.className='feedback '+(ok?'correct':'wrong')+' show';
  fb.innerHTML=(ok?'✅ ':'❌ ')+exp;
};

function buildValsTF(){
  const items=[
    {q:'Los valores son principios que guían cómo actúamos, especialmente cuando nadie nos ve.',a:true},
    {q:'Ser honesto significa decir siempre lo que pensamos, aunque haga daño innecesariamente.',a:false},
    {q:'La empatía es saber ponerse en el lugar de los demás y actuar en consecuencia.',a:true},
    {q:'Una persona responsable solo cumple sus compromisos cuando le apetece.',a:false},
    {q:'La gratitud fortalece las relaciones con los demás.',a:true},
    {q:'El respeto solo es necesario con los adultos, no con los compañeros.',a:false},
    {q:'Reconocer los propios errores es una muestra de honestidad y valentía.',a:true},
    {q:'Los valores solo son importantes para los adultos, no para los niños.',a:false},
  ].sort(()=>Math.random()-.5).slice(0,6);
  document.getElementById('tema-content').innerHTML=`
    <div class="card"><div class="card-title">🌱 Verdadero o Falso — Valores</div>
    <p style="color:var(--gray-600);margin-bottom:16px">¿Verdad o mito sobre los valores y la forma de ser persona?</p></div>
    ${items.map((it,i)=>`
    <div class="exercise-box" id="vtf-box-${i}">
      <div class="q-num">Afirmación ${i+1}</div>
      <div class="q-text">${it.q}</div>
      <div class="tf-row">
        <button class="tf-btn verd" data-correct="${it.a?'verdadero':'falso'}" data-chosen="verdadero" onclick="checkVTF(this,${i})">✅ Verdadero</button>
        <button class="tf-btn fals" data-correct="${it.a?'verdadero':'falso'}" data-chosen="falso" onclick="checkVTF(this,${i})">❌ Falso</button>
      </div>
      <div class="feedback" id="vtf-fb-${i}"></div>
    </div>`).join('')}
    <div class="btn-row"><button class="btn btn-success" onclick="showValsPhase(4)">Mini Test →</button></div>`;
}
window.checkVTF=function(btn,i){
  btn.closest('.exercise-box').querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
  const ok=btn.dataset.chosen===btn.dataset.correct;
  btn.classList.add(ok?'correct':'wrong');
  const fb=document.getElementById('vtf-fb-'+i);
  fb.className='feedback '+(ok?'correct':'wrong')+' show';
  fb.textContent=ok?'✅ ¡Correcto!':'❌ Era: '+btn.dataset.correct;
};

function buildValsTest(){
  const ALL=[
    {type:'mc',question:'¿Qué es la empatía?',options:['Ser muy inteligente','Ponerse en el lugar del otro','Ganar siempre en los juegos'],correct:'Ponerse en el lugar del otro'},
    {type:'tf',question:'Ser honesto significa decir la verdad aunque a veces sea difícil.',correct:'verdadero'},
    {type:'mc',question:'¿Cuál de estos es un ejemplo de gratitud?',options:['Pedir más cosas','Dar las gracias de corazón','Ignorar lo que otros hacen por ti'],correct:'Dar las gracias de corazón'},
    {type:'tf',question:'Una persona responsable cumple sus compromisos solo cuando le conviene.',correct:'falso'},
    {type:'mc',question:'¿Por qué son importantes los valores?',options:['Para sacar mejores notas','Para ser mejor persona y tener mejores relaciones','Solo importan a los adultos'],correct:'Para ser mejor persona y tener mejores relaciones'},
    {type:'tf',question:'El respeto implica tratar a los demás como quieres que te traten a ti.',correct:'verdadero'},
    {type:'mc',question:'¿Qué muestra una persona que reconoce sus errores?',options:['Debilidad','Honestidad y valentía','Que no sabe hacer las cosas'],correct:'Honestidad y valentía'},
    {type:'mc',question:'Si encuentras algo perdido, ¿qué harías?',options:['Quedármelo sin decir nada','Entregarlo para que llegue a su dueño','Tirarlo a la basura'],correct:'Entregarlo para que llegue a su dueño'},
    {type:'tf',question:'Los valores solo se demuestran cuando alguien nos está mirando.',correct:'falso'},
  ];
  buildMiniTest(ALL.sort(()=>Math.random()-.5).slice(0,6),'tema-content',pct=>{
    progress.tema.score=pct; progress.tema.done=true; updateHome();
  });
}

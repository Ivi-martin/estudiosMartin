<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap');
  :root {
    color-scheme: dark;
    --bg: #070d1a; --surface: #0d1525; --panel: #111e35; --border: #1e3055;
    --text: #d8e8f8; --muted: #6a88aa;
    --accent-blue: #378ADD; --accent-teal: #1D9E75;
    --accent-amber: #EF9F27; --accent-red: #E24B4A; --accent-purple: #7F77DD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Nunito Sans', sans-serif; color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  h1, h2, h3, .font-game { font-family: 'Nunito', sans-serif; }

  /* SCREENS */
  .screen { width: 100%; padding: 16px; display: none; flex-direction: column; gap: 16px; }
  .screen.active { display: flex; }
  #screen-game.active { flex: 1; min-height: 0; flex-direction: column; }

  /* SELECTOR */
  #screen-subject { align-items: center; padding-top: 32px; }
  .game-logo { text-align: center; margin-bottom: 8px; }
  .game-logo h1 { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; }
  .game-logo p { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .avatar-hero { width: 100px; height: 110px; object-fit: contain; filter: drop-shadow(0 4px 16px rgba(55,138,221,0.4)); }
  .subject-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
  .subj-btn {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 14px 16px; cursor: pointer; text-align: left;
    transition: border-color .18s, background .18s, transform .12s;
    display: flex; align-items: center; gap: 12px;
  }
  .subj-btn:hover { border-color: var(--accent-blue); background: #0f1e38; transform: translateY(-2px); }
  .subj-btn.selected { border-color: var(--accent-teal); background: #0a2018; }
  .subj-icon { font-size: 28px; width: 36px; text-align: center; }
  .subj-info h3 { font-size: 14px; font-weight: 700; color: var(--text); font-family: 'Nunito', sans-serif; }
  .subj-info span { font-size: 12px; color: var(--muted); }
  .btn-start {
    background: var(--accent-teal); border: none; border-radius: 12px;
    color: #e8fff6; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
    padding: 14px 40px; cursor: pointer; width: 100%;
    transition: opacity .2s, transform .12s; margin-top: 4px;
  }
  .btn-start:disabled { opacity: .35; cursor: default; }
  .btn-start:not(:disabled):hover { opacity: .88; transform: translateY(-1px); }

  /* HUD */
  #hud {
    width: 100%; display: none; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  #hud.visible { display: flex; }
  .hud-label { font-size: 12px; color: var(--muted); }
  .hud-val { font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif; color: var(--text); }
  .hud-sep { width: 1px; height: 24px; background: var(--border); }
  #lives-row { display: flex; gap: 4px; }
  .heart-icon { font-size: 16px; transition: opacity .3s; }
  .heart-icon.lost { opacity: .15; }
  #wave-badge {
    margin-left: auto; background: #0d1a30; border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 700;
    color: var(--accent-blue); font-family: 'Nunito', sans-serif;
  }
  #sound-btn {
    background: none; border: none; cursor: pointer; font-size: 18px;
    color: var(--muted); transition: color .2s;
  }

  /* GAME SCREEN */
  #screen-game { padding: 0; flex: 1; min-height: 0; }
  #canvas-wrap { position: relative; width: 100%; flex: 1; min-height: 0; }
  canvas#gc { display: block; width: 100%; height: 100%; background: #070d1a; border-bottom: 1px solid var(--border); }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(4,8,18,.90); display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
  }
  #overlay h2 { font-size: 22px; font-weight: 900; color: var(--text); text-align: center; font-family: 'Nunito', sans-serif; }
  #overlay p { font-size: 14px; color: var(--muted); text-align: center; max-width: 280px; line-height: 1.6; }
  #ov-btn {
    background: var(--accent-blue); border: none; border-radius: 10px;
    color: #e6f1fb; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800;
    padding: 12px 32px; cursor: pointer; transition: opacity .2s;
  }
  #ov-btn:hover { opacity: .85; }

  /* QUESTION PANEL */
  #q-panel { background: var(--panel); border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; }
  #q-subject-tag {
    display: inline-block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
    background: var(--surface); color: var(--muted); border: 1px solid var(--border);
  }
  #q-text { font-size: 16px; font-weight: 600; line-height: 1.5; margin-bottom: 14px; min-height: 48px; color: var(--text); font-family: 'Nunito', sans-serif; }
  #q-answers { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ans-btn {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--muted); font-family: 'Nunito Sans', sans-serif; font-size: 14px;
    font-weight: 600; padding: 11px 14px; cursor: pointer; text-align: left;
    line-height: 1.3; transition: background .15s, border-color .15s, color .15s;
  }
  .ans-btn:hover:not(:disabled) { background: #142038; border-color: var(--accent-blue); color: var(--text); }
  .ans-btn.correct { background: rgba(29,158,117,.15); border-color: var(--accent-teal); color: #5de8b6; }
  .ans-btn.wrong   { background: rgba(226,75,74,.15); border-color: var(--accent-red);  color: #f08080; }
  .ans-btn:disabled { cursor: not-allowed; }
  #feedback { font-size: 13px; font-weight: 700; margin-top: 10px; min-height: 20px; }
  #feedback.good { color: var(--accent-teal); }
  #feedback.bad  { color: var(--accent-red); }

  /* BACK BTN */
  #btn-back {
    display: none; position: fixed; bottom: 16px; right: 16px; z-index: 20;
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    color: var(--muted); font-family: 'Nunito', sans-serif; font-size: 13px;
    font-weight: 700; padding: 8px 16px; cursor: pointer; transition: background .2s;
  }
  #btn-back.visible { display: block; }
  #btn-back:hover { background: #142038; }

  /* CRÉDITOS */
  #credits-row { display: flex; gap: 4px; align-items: center; }
  .coin-icon { font-size: 15px; transition: opacity .3s; }
  .coin-icon.spent { opacity: .15; }
  #credits-counter { font-size: 13px; font-weight: 800; color: var(--accent-amber); font-family: 'Nunito', sans-serif; }
  .no-credits-msg { 
    position: fixed; inset: 0; background: rgba(4,8,18,.95); z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    padding: 32px;
  }
  .no-credits-msg h2 { font-size: 26px; font-weight: 900; color: var(--text); text-align: center; font-family: 'Nunito', sans-serif; }
  .no-credits-msg p { font-size: 15px; color: var(--muted); text-align: center; max-width: 320px; line-height: 1.7; }
  .no-credits-msg .coin-big { font-size: 60px; }
  .btn-goto { background: var(--accent-amber); border: none; border-radius: 12px; color: #1a1000;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; padding: 12px 28px; cursor: pointer; }
  .btn-goto:hover { opacity:.85; }
  #credit-use-flash {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: var(--accent-amber); color: #1a1000; font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800; padding: 8px 20px; border-radius: 20px;
    opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 50;
  }
  #credit-use-flash.show { opacity: 1; }
</style>
</head>

function creditKey(subj) { return 'credits_' + subj; }
function getCredits(subj) { return parseInt(localStorage.getItem(creditKey(subj)) || '0'); }
function setCredits(subj, n) { localStorage.setItem(creditKey(subj), Math.max(0, n)); }
function spendCredit(subj) {
  const n = getCredits(subj);
  if (n > 0) { setCredits(subj, n - 1); return true; }
  return false;
}

// ─── RÉCORDS ──────────────────────────────────────────────────────────────────
function recordKey(subj) { return 'record_' + subj; }
function getRecord(subj) { return parseInt(localStorage.getItem(recordKey(subj)) || '0'); }
function saveRecord(subj, pts) {
  if (pts > getRecord(subj)) {
    localStorage.setItem(recordKey(subj), pts);
    return true;
  }
  return false;
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
function beep(freq, dur, type='square', vol=0.15) {
  if (!soundOn) return;
  try {
    const a = getAudio();
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, a.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    osc.connect(gain); gain.connect(a.destination);
    osc.start(); osc.stop(a.currentTime + dur);
  } catch(e) {}
}
function sfxCorrect()   { beep(660,.08,'sine',.18); setTimeout(()=>beep(880,.12,'sine',.15),80); }
function sfxWrong()     { beep(180,.25,'sawtooth',.15); }
function sfxShoot()     { beep(440,.06,'square',.1); }
function sfxExplosion() { beep(120,.18,'sawtooth',.2); setTimeout(()=>beep(80,.2,'sawtooth',.1),60); }
function sfxWaveClear() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.15,'sine',.18),i*120)); }
function toggleSound()  { soundOn = !soundOn; document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇'; }

// ─── VOZ ─────────────────────────────────────────────────────────────────────
function speak(text) {
  if (!soundOn) return;
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'es-ES';
  utt.rate = 0.95;
  utt.pitch = 1.05;
  window.speechSynthesis.speak(utt);
}

// ─── SELECTOR UI ─────────────────────────────────────────────────────────────
function buildSubjectSelector() {
  const grid = document.getElementById('subject-grid');
  Object.entries(QUESTIONS).forEach(([id, data]) => {
    const btn = document.createElement('button');
    btn.className = 'subj-btn';
    btn.innerHTML = `<span class="subj-icon">${data.icon}</span>
      <div class="subj-info">
        <h3>${data.label}</h3>
        <span>${data.qs.length} preguntas</span>
      </div>`;
    btn.onclick = () => selectSubject(id, btn);
    grid.appendChild(btn);
  });
}

function selectSubject(id, btn) {
  document.querySelectorAll('.subj-btn').forEach(b => b.classList.remove('selected'));
  if (btn) btn.classList.add('selected');
  selectedSubject = id;
  document.getElementById('btn-start').disabled = false;
  beep(440,.06,'sine',.1);
}

function goBack() {
  cancelAnimationFrame(raf);
  state = 'idle';
  document.getElementById('screen-game').classList.remove('active');
  document.getElementById('screen-subject').classList.add('active');
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('btn-back').classList.remove('visible');
  // Ocultar la pantalla de subject si venimos con URL param
  const auto = getSubjectFromURL();
  if (auto && QUESTIONS[auto]) {
    // Volver directamente a jugar, no mostrar selector
    startGame();
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getQuestion() {
  const pool = QUESTIONS[selectedSubject].qs;
  if (usedQs.length >= pool.length) usedQs = [];
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); } while (usedQs.includes(idx));
  usedQs.push(idx);
  return pool[idx];
}

// ─── UI PREGUNTA ─────────────────────────────────────────────────────────────
function showQuestion(q) {
  if (questionActive) return;
  currentQ = q; questionActive = true; answerLocked = false;
  const color = QUESTIONS[selectedSubject].color;
  const tag = document.getElementById('q-subject-tag');
  tag.textContent = QUESTIONS[selectedSubject].label;
  tag.style.borderColor = color + '55'; tag.style.color = color;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = '';
  const cont = document.getElementById('q-answers');
  cont.innerHTML = '';
  q.a.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn'; btn.textContent = opt;
    btn.onclick = () => handleAnswer(i, btn);
    cont.appendChild(btn);
  });
}

function handleAnswer(idx, btn) {
  if (answerLocked || state !== 'playing') return;
  const correct = idx === currentQ.c;
  const fb = document.getElementById('feedback');
  if (correct) {
    answerLocked = true;
    btn.classList.add('correct');
    // Disable all buttons now
    document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
    streak++; score += 10 + (streak > 2 ? streak * 3 : 0);
    document.getElementById('score-disp').textContent = score;
    document.getElementById('streak-disp').textContent = streak;
    fb.textContent = streak > 2 ? `¡Correcto! 🔥 Racha ×${streak}` : '¡Correcto! ⚡';
    fb.className = 'good';
    sfxCorrect();
    fireBullet();
    mouthOpen = true; mouthOpenTimer = 18;
    setTimeout(() => {
      questionActive = false;
      if (state === 'playing') showQuestion(getQuestion());
    }, 1000);
  } else {
    // Mark wrong but keep other options available
    btn.classList.add('wrong');
    btn.disabled = true;
    streak = 0;
    document.getElementById('streak-disp').textContent = 0;
    fb.textContent = '❌ Incorrecto — intenta otra respuesta';
    fb.className = 'bad';
    sfxWrong();
    // No loseLife(), no answerLocked
  }
}

// ─── LÓGICA ───────────────────────────────────────────────────────────────────
function fireBullet() {
  if (!enemies.length) return;
  const target = enemies.reduce((a, b) => a.x < b.x ? a : b);
  sfxShoot();
  bullets.push({ x: 78, y: 140, target, speed: 9 });
}

function loseLife() {
  lives--;
  const h = document.getElementById('h' + lives);
  if (h) h.classList.add('lost');
  if (lives <= 0) gameOver();
}

function gameOver() {
  state = 'over';
  cancelAnimationFrame(raf);
  sfxWrong();
  // Save record
  const isRecord = saveRecord(selectedSubject, score);
  // Check credits
  const creditsLeft = getCredits(selectedSubject);
  if (creditsLeft > 0) {
    // Tiene créditos: puede continuar
    document.getElementById('ov-title').textContent = '¡Fin del juego!';
    document.getElementById('ov-msg').textContent = `Conseguiste ${score} puntos · oleada ${wave}.${isRecord ? ' 🏆 ¡Nuevo récord!' : ''} Tienes ${creditsLeft} crédito${creditsLeft>1?'s':''} restante${creditsLeft>1?'s':''}. ¿Usas uno para seguir?`;
    document.getElementById('ov-btn').textContent = '🪙 Usar crédito y continuar';
    document.getElementById('ov-btn').onclick = () => {
      spendCredit(selectedSubject);
      wave = 1; score = 0; lives = 3; streak = 0;
      enemies = []; bullets = []; particles = []; usedQs = [];
      resetHud();
      document.getElementById('ov-title').textContent = '¡Defiende la base!';
      document.getElementById('ov-msg').textContent = 'Responde correctamente para disparar.';
      document.getElementById('ov-btn').textContent = 'Empezar';
      document.getElementById('ov-btn').onclick = beginWave;
      document.getElementById('overlay').style.display = 'flex';
    };
  } else {
    // Sin créditos: game over definitivo
    document.getElementById('ov-title').textContent = '¡Sin créditos!';
    document.getElementById('ov-msg').textContent = `Puntuación final: ${score} puntos · oleada ${wave}.${isRecord ? ' 🏆 ¡Nuevo récord!' : ''} Consigue más créditos completando el examen de la asignatura.`;
    document.getElementById('ov-btn').textContent = '← Volver a estudiar';
    document.getElementById('ov-btn').onclick = () => {
      const url = QUESTIONS[selectedSubject]?.subject_url;
      if (url) location.href = url;
      else goBack();
    };
  }
  document.getElementById('overlay').style.display = 'flex';
}

function waveComplete() {
  state = 'waveclear';
  wave++;
  document.getElementById('wave-num').textContent = wave;
  score += 50;
  document.getElementById('score-disp').textContent = score;
  sfxWaveClear();
  if (wave - 1 >= 5) {
    // Won wave 5 (or beyond) — victory message
    document.getElementById('ov-title').textContent = '🏆 ¡Campeón!';
    document.getElementById('ov-msg').textContent = `¡Has completado la oleada ${wave-1}! +50 puntos. Puedes seguir o volver.`;
    document.getElementById('ov-btn').textContent = `Oleada ${wave} →`;
    setTimeout(() => speak('Enhorabuena, te has convertido en el más inteligente'), 600);
  } else {
    document.getElementById('ov-title').textContent = `✅ ¡Oleada ${wave-1} completada!`;
    document.getElementById('ov-msg').textContent = `+50 puntos extra. ¡Los enemigos son más rápidos en la oleada ${wave}!`;
    document.getElementById('ov-btn').textContent = `Oleada ${wave}`;
    setTimeout(() => speak('Bien hecho, prepárate para la siguiente oleada'), 600);
  }
  document.getElementById('overlay').style.display = 'flex';
}

function spawnEnemy() {
  const types = ['virus','bug','duda'];
  const t = types[Math.floor(Math.random() * types.length)];
  const speed = 0.20 + wave * 0.06 + Math.random() * 0.15;
  enemies.push({ x: W - 28, y: 155 + Math.random() * 40, r: 18, speed, type: t, flash: 0 });
}

function resetHud() {
  ['h0','h1','h2'].forEach(id => document.getElementById(id).classList.remove('lost'));
  document.getElementById('score-disp').textContent = 0;
  document.getElementById('streak-disp').textContent = 0;
  document.getElementById('wave-num').textContent = wave;
  updateCreditsHud();
}

function updateCreditsHud() {
  if (!selectedSubject) return;
  const n = getCredits(selectedSubject);
  const el = document.getElementById('credits-counter');
  el.textContent = '🪙 × ' + n;
  el.style.color = n > 0 ? 'var(--accent-amber)' : 'var(--accent-red)';
}

function startGame() {
  // Check credits if launched from a subject page
  const autoSubj = getSubjectFromURL();
  if (autoSubj && QUESTIONS[autoSubj]) {
    const credits = getCredits(autoSubj);
    if (credits <= 0) {
      showNoCredits(autoSubj);
      return;
    }
    // Spend one credit to start
    spendCredit(autoSubj);
  }
  document.getElementById('screen-subject').classList.remove('active');
  document.getElementById('screen-game').classList.add('active');
  document.getElementById('hud').classList.add('visible');
  document.getElementById('btn-back').classList.add('visible');
  wave = 1; score = 0; lives = 3; streak = 0;
  usedQs = []; enemies = []; bullets = []; particles = [];
  spawnTimer = 0; waveKills = 0; waveTarget = 3 + wave * 2;
  resetHud();
  document.getElementById('ov-title').textContent = '¡Defiende la base!';
  document.getElementById('ov-msg').textContent = 'Responde correctamente para disparar a los enemigos.';
  document.getElementById('ov-btn').textContent = 'Empezar';
  document.getElementById('ov-btn').onclick = beginWave;
  document.getElementById('overlay').style.display = 'flex';
}

function showNoCredits(subj) {
  const data = QUESTIONS[subj] || {};
  const overlay = document.createElement('div');
  overlay.className = 'no-credits-msg';
  const subjUrl = data.subject_url || '../index.html';
  const subjLabel = data.label || subj;
  overlay.innerHTML =
    '<div class="coin-big">\u{1FA99}</div>' +
    '<h2>Sin cr\u00E9ditos para<br>' + subjLabel + '</h2>' +
    '<p>Consigue cr\u00E9ditos superando el examen final de <strong>' + subjLabel + '</strong>.<br><br>' +
    'Cuanto mejor nota saques, m\u00E1s cr\u00E9ditos obtienes:</p>' +
    '<p style="font-size:13px;color:var(--accent-amber)">' +
    '5.0\u20135.9 \u2192 1 cr\u00E9d &nbsp;\u00B7&nbsp; 6.0\u20136.9 \u2192 2 cr\u00E9d &nbsp;\u00B7&nbsp; 7.0\u20137.9 \u2192 3 cr\u00E9d<br>' +
    '8.0\u20138.9 \u2192 4 cr\u00E9d &nbsp;\u00B7&nbsp; 9.0\u20139.9 \u2192 5 cr\u00E9d &nbsp;\u00B7&nbsp; 10 \u2192 6 cr\u00E9d' +
    '</p>' +
    '<button class="btn-goto" onclick="location.href=\'' + subjUrl + '\'">\u{1F4DA} Ir a estudiar ' + subjLabel + '</button>' +
    '<button class="btn-goto" style="background:var(--surface);border:1px solid var(--border);color:var(--muted)" onclick="location.href=\'../index.html\'">\u2190 Inicio</button>';
  document.body.appendChild(overlay);
}

function beginWave() {
  document.getElementById('overlay').style.display = 'none';
  state = 'playing'; questionActive = false; answerLocked = false;
  spawnTimer = 0; waveKills = 0; waveTarget = 3 + wave * 2;
  showQuestion(getQuestion());
  cancelAnimationFrame(raf); loop();
}

document.getElementById('ov-btn').onclick = () => {
  if (state === 'over') {
    wave = 1; score = 0; lives = 3; streak = 0;
    enemies = []; bullets = []; particles = []; usedQs = [];
    resetHud();
    document.getElementById('ov-title').textContent = '¡Defiende la base!';
    document.getElementById('ov-msg').textContent = 'Responde correctamente para disparar.';
    document.getElementById('ov-btn').textContent = 'Empezar';
    document.getElementById('ov-btn').onclick = beginWave;
    document.getElementById('overlay').style.display = 'flex';
  } else if (state === 'waveclear' || state === 'idle') {
    beginWave();
  }
};

// ─── CANVAS DRAWING ───────────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = '#070d1a'; ctx.fillRect(0,0,W,H);
  // Estrellas
  [[50,20],[150,35],[280,15],[400,40],[530,25],[620,10],[320,55],[480,12]].forEach(([x,y]) => {
    ctx.fillStyle = 'rgba(200,220,255,0.5)';
    ctx.beginPath(); ctx.arc(x,y,1.2,0,Math.PI*2); ctx.fill();
  });
  // Suelo
  ctx.fillStyle = '#0b3f20'; ctx.fillRect(0,210,W,50);
  ctx.fillStyle = '#094f26'; ctx.fillRect(0,208,W,5);
  // Base (muro)
  ctx.fillStyle = '#0a2a16'; ctx.fillRect(0,162,92,50);
  ctx.strokeStyle = '#1a6b40'; ctx.lineWidth = 1.5;
  ctx.strokeRect(0,162,92,50);
  ctx.fillStyle = '#88a8b8'; ctx.font = '600 11px "Nunito Sans",sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('BASE',46,190);
  // Línea de tierra
  ctx.setLineDash([4,7]); ctx.strokeStyle = '#152a48'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(92,210); ctx.lineTo(W,210); ctx.stroke();
  ctx.setLineDash([]);
}

function drawMartin() {
  const px = 15, py = 208;
  const bob = Math.sin(Date.now() * 0.004) * 1.5;

  ctx.save();
  ctx.translate(px, py + bob);

  if (mouthOpen) {
    mouthOpenTimer--;
    if (mouthOpenTimer <= 0) mouthOpen = false;
  }

  if (charImagesReady) {
    const src = mouthOpen ? imgOpen : imgClosed;
    const drawH = 110;
    const drawW = CHAR_W * (drawH / CHAR_H);
    ctx.drawImage(src, -drawW/2 + 30, -drawH, drawW, drawH);
  } else {
    ctx.fillStyle = '#d4a574';
    ctx.beginPath(); ctx.ellipse(30,-50,14,18,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.ellipse(30,-60,15,9,0,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  if (e.flash > 0) ctx.globalAlpha = 0.5 + e.flash * 0.5;
  if (e.type === 'virus') {
    ctx.fillStyle = '#E24B4A'; ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#F7C1C1';
    for (let i=0;i<6;i++) {
      const a = (i/6)*Math.PI*2;
      ctx.beginPath(); ctx.arc(Math.cos(a)*(e.r+5), Math.sin(a)*(e.r+5),4,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('?',0,1);
  } else if (e.type === 'bug') {
    ctx.fillStyle = '#7a3e00'; ctx.beginPath(); ctx.ellipse(0,0,e.r,e.r*0.7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#EF9F27'; ctx.beginPath(); ctx.arc(0,-5,7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#5a2e00'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-e.r,-4); ctx.lineTo(-e.r-8,-11); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(e.r,-4); ctx.lineTo(e.r+8,-11); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('!',0,3);
  } else {
    ctx.fillStyle = '#534AB7'; ctx.beginPath();
    ctx.moveTo(0,-e.r); ctx.lineTo(e.r*0.87,e.r*0.5); ctx.lineTo(-e.r*0.87,e.r*0.5); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#CECBF6'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('X',0,4);
  }
  ctx.restore();
}

function spawnParticles(x, y, color) {
  for (let i=0;i<10;i++) {
    const a = Math.random()*Math.PI*2, s = 1.5+Math.random()*2.5;
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1.5, life:1, color});
  }
}

function loop() {
  if (state !== 'playing') return;
  ctx.clearRect(0,0,W,H);
  drawBackground();
  // Spawn
  spawnTimer++;
  const interval = Math.max(130 - wave*10, 45);
  const maxE = Math.min(2+wave, 6);
  if (spawnTimer > interval && enemies.length < maxE && waveKills < waveTarget) {
    spawnEnemy(); spawnTimer = 0;
  }
  // Enemies
  enemies = enemies.filter(e => {
    e.x -= e.speed;
    if (e.flash > 0) e.flash -= 0.15;
    if (e.x < 92) {
      spawnParticles(92, e.y, '#e24b4a'); loseLife(); sfxExplosion(); return false;
    }
    drawEnemy(e); return true;
  });
  // Bullets
  bullets = bullets.filter(b => {
    const ei = enemies.indexOf(b.target);
    if (ei === -1) return false;
    const t = b.target;
    const dx = t.x - b.x, dy = t.y - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < b.speed + t.r) {
      spawnParticles(t.x, t.y, '#5DCAA5');
      enemies.splice(ei, 1);
      waveKills++;
      sfxExplosion();
      if (waveKills >= waveTarget && enemies.length === 0 && state === 'playing') {
        state = 'pausing'; setTimeout(waveComplete, 500);
      }
      return false;
    }
    b.x += (dx/dist)*b.speed; b.y += (dy/dist)*b.speed;
    // Bola de energía — imagen
    if (balaImg.complete && balaImg.naturalWidth > 0) {
      ctx.drawImage(balaImg, b.x - BALA_SIZE/2, b.y - BALA_SIZE/2, BALA_SIZE, BALA_SIZE);
    } else {
      const grd = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,8);
      grd.addColorStop(0,'rgba(93,202,165,1)');
      grd.addColorStop(1,'rgba(93,202,165,0)');
      ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(b.x,b.y,8,0,Math.PI*2); ctx.fill();
    }
    return true;
  });
  // Particles
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.life-=0.045;
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; return p.life>0;
  });
  drawMartin();
  if (state === 'playing') raf = requestAnimationFrame(loop);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Auto-arranque por URL param
const autoSubject = getSubjectFromURL();
if (autoSubject && QUESTIONS[autoSubject]) {
  selectedSubject = autoSubject;
  document.getElementById('screen-subject').style.display = 'none';
  document.getElementById('btn-back').textContent = '← Volver a estudiar';
  function tryAutoStart() { startGame(); }
  if (_closedLoaded && _openLoaded) {
    setTimeout(tryAutoStart, 300);
  } else {
    imgClosed.addEventListener('load', () => {
      if (_closedLoaded && _openLoaded) setTimeout(tryAutoStart, 300);
    });
    imgOpen.addEventListener('load', () => {
      if (_closedLoaded && _openLoaded) setTimeout(tryAutoStart, 300);
    });
  }
} else {
  buildSubjectSelector();
}
</script>
